spring.application.name=ventas-backend-springboot
# ==========================================
# CONFIGURACIÓN — ventas-backend-springboot
# ==========================================

# ------------------------------------------
# SERVIDOR
# Puerto 8081 para no chocar con Quarkus (8080)
# ------------------------------------------
server.port=${SERVER_PORT:8081}

# ------------------------------------------
# BASE DE DATOS
# Misma BD que Quarkus ✅
# ------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bdventas}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Admin@12345!}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexiones
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10

# ------------------------------------------
# JPA / HIBERNATE
# ------------------------------------------
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ------------------------------------------
# FLYWAY
# NO ejecuta migraciones nuevas
# Las tablas ya existen (las creó Quarkus)
# ------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=4

# ------------------------------------------
# JWT
# ------------------------------------------
app.jwt.secret=${JWT_SECRET:mi-clave-secreta-muy-larga-minimo-256-bits-para-hmac}
app.jwt.expiration=${JWT_EXPIRATION:3600000}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}
app.jwt.issuer=ventas-app

# ------------------------------------------
# CORS
# ------------------------------------------
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

# ------------------------------------------
# NEGOCIO
# IGUAL QUE QUARKUS ✅
# ------------------------------------------
app.igv.porcentaje=0.18

# ------------------------------------------
# SWAGGER UI
# ------------------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.try-it-out-enabled=true

# ------------------------------------------
# LOGGING
# ------------------------------------------
logging.level.com.ventas=INFO
logging.level.org.springframework.security=INFO